<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Range Sacrifice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; color: #fff; z-index: 10;
    }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px; z-index: 20; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.9);
    }
    #crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; transform: translateY(-50%); }
    #crosshair::after { left: 50%; top: 0; height: 100%; width: 1px; transform: translateX(-50%); }
    #crosshair-dot {
      position: fixed; top: 50%; left: 50%;
      width: 3px; height: 3px; background: #f00;
      border-radius: 50%; transform: translate(-50%,-50%);
      z-index: 21; pointer-events: none;
    }

    /* Scope overlay */
    #scope {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; z-index: 15; pointer-events: none;
    }
    #scope.active { display: block; }
    #scope-circle {
      position: absolute; top: 50%; left: 50%;
      width: 70vmin; height: 70vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.8);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.88);
    }
    #scope-h { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 68vmin; height: 1px; background: rgba(0,200,0,0.7); }
    #scope-v { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); height: 68vmin; width: 1px; background: rgba(0,200,0,0.7); }
    #scope-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 4px; height: 4px; background: #0f0; border-radius: 50%; }
    #scope-label { position: absolute; top: calc(50% - 35vmin + 8px); left: 50%; transform: translateX(-50%); color: rgba(0,200,0,0.7); font-size: 11px; letter-spacing: 2px; }

    /* Kill feed */
    #killfeed {
      position: fixed; top: 80px; right: 16px;
      display: flex; flex-direction: column; gap: 4px;
      align-items: flex-end; z-index: 30;
    }
    .kill-entry {
      background: rgba(0,0,0,0.7); padding: 4px 10px;
      font-size: 12px; border-left: 2px solid #c00;
      animation: fadeKill 4s forwards;
      white-space: nowrap;
    }
    .kill-entry .killer { color: #4af; }
    .kill-entry .victim { color: #fa4; }
    @keyframes fadeKill { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

    /* Scoreboard */
    #scores {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 6px 20px; font-size: 13px;
      display: flex; gap: 20px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-item { display: flex; flex-direction: column; align-items: center; }
    .score-val { font-size: 20px; font-weight: bold; color: #4af; }
    .score-lbl { font-size: 10px; color: #888; letter-spacing: 1px; }

    /* Health */
    #health-bar-wrap {
      position: fixed; bottom: 30px; left: 30px;
      background: rgba(0,0,0,0.6); padding: 6px 10px; width: 200px;
    }
    #health-label { font-size: 11px; color: #888; margin-bottom: 4px; letter-spacing: 2px; }
    #health-bar-bg { background: #222; height: 6px; width: 100%; }
    #health-bar { background: #0c0; height: 6px; width: 100%; transition: width 0.3s, background 0.3s; }

    /* Ammo */
    #ammo {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(0,0,0,0.6); padding: 8px 16px;
      font-size: 28px; font-weight: bold; color: #ccc;
      letter-spacing: 2px;
    }
    #ammo span { font-size: 13px; color: #888; margin-left: 6px; }

    /* Hit marker */
    #hitmarker {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 20px; height: 20px; z-index: 25; pointer-events: none;
      opacity: 0; transition: opacity 0.1s;
    }
    #hitmarker.show { opacity: 1; }
    #hitmarker::before, #hitmarker::after {
      content: ''; position: absolute; background: #f00;
    }
    #hitmarker::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%) rotate(45deg); }
    #hitmarker::after { left: 50%; top: 0; height: 100%; width: 2px; transform: translateX(-50%) rotate(45deg); }

    /* Bolt action flash */
    #bolt-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.04); pointer-events: none;
      opacity: 0; z-index: 12; transition: opacity 0.05s;
    }
    #bolt-overlay.flash { opacity: 1; }

    /* Sniper death screen */
    #death-screen {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(100,0,0,0.5); z-index: 50; pointer-events: none;
      justify-content: center; align-items: center; flex-direction: column;
    }
    #death-screen.show { display: flex; }
    #death-screen h2 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #f00; }
    #death-screen p { color: #ccc; margin-top: 10px; }

    /* Menu */
    #menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); z-index: 100;
      display: flex; justify-content: center; align-items: center; flex-direction: column;
      gap: 20px;
    }
    #menu h1 { font-size: 52px; color: #fff; letter-spacing: 6px; text-transform: uppercase; }
    #menu h1 span { color: #c00; }
    #menu input {
      background: #111; border: 1px solid #333; color: #fff;
      padding: 10px 20px; font-size: 16px; width: 280px;
      font-family: 'Courier New', monospace; text-align: center; letter-spacing: 2px;
    }
    #menu button {
      background: #c00; border: none; color: #fff;
      padding: 12px 40px; font-size: 18px; cursor: pointer;
      font-family: 'Courier New', monospace; letter-spacing: 3px;
      text-transform: uppercase; transition: background 0.2s;
    }
    #menu button:hover { background: #f00; }
    #menu .subtitle { color: #555; font-size: 13px; letter-spacing: 2px; }
    #menu .controls-hint { color: #444; font-size: 12px; text-align: center; line-height: 1.8; }

    /* Connecting */
    #connecting {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 200; justify-content: center; align-items: center;
      color: #c00; font-size: 18px; letter-spacing: 4px;
    }
    #connecting.show { display: flex; }

    #players-online { font-size: 12px; color: #555; }
  </style>
</head>
<body>

<div id="connecting">CONNECTING...</div>

<div id="menu">
  <h1>LONG RANGE <span>SACRIFICE</span></h1>
  <div class="subtitle">ONLINE MULTIPLAYER SNIPER</div>
  <input id="name-input" type="text" placeholder="ENTER CALLSIGN" maxlength="16" />
  <button id="play-btn">DEPLOY</button>
  <div class="controls-hint">
    WASD — Move &nbsp;|&nbsp; Mouse — Aim &nbsp;|&nbsp; RMB / F — Scope &nbsp;|&nbsp; LMB — Fire &nbsp;|&nbsp; Shift — Sprint
  </div>
  <div id="players-online">Connecting to server...</div>
</div>

<div id="hud">
  <div id="scores">
    <div class="score-item"><div class="score-val" id="stat-kills">0</div><div class="score-lbl">KILLS</div></div>
    <div class="score-item"><div class="score-val" id="stat-deaths">0</div><div class="score-lbl">DEATHS</div></div>
    <div class="score-item"><div class="score-val" id="stat-players">1</div><div class="score-lbl">ONLINE</div></div>
  </div>
  <div id="killfeed"></div>
  <div id="health-bar-wrap">
    <div id="health-label">HEALTH</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
  <div id="ammo">1<span>/ ∞</span></div>
</div>

<div id="crosshair"></div>
<div id="crosshair-dot"></div>
<div id="hitmarker"></div>
<div id="bolt-overlay"></div>

<div id="scope">
  <div id="scope-circle">
    <div id="scope-h"></div>
    <div id="scope-v"></div>
    <div id="scope-dot"></div>
    <div id="scope-label">LRS · 10×</div>
  </div>
</div>

<div id="death-screen">
  <h2>ELIMINATED</h2>
  <p>Respawning...</p>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
